stages:
- artifacts
- build-and-push

variables:
  IMAGE_TAG: "563.0.0"
  ALEXOS_CLI_PROJECT_ID: "77029455"
  IMAGE_NAME: "al3xos/ci-tools"
  BUILD_CACHE_REF: "al3xos/ci-tools:buildcache"

download-alexos-cli:
  stage: artifacts
  image: alpine:3.23
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      RESPONSE=$(curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${ALEXOS_CLI_PROJECT_ID}/packages?package_name=alexos-cli&order_by=created_at&sort=desc&per_page=1")
      LATEST_VERSION=$(echo "${RESPONSE}" | jq -r 'if type == "array" then .[0].version else .version end')
      echo "Using alexos-cli version: ${LATEST_VERSION}"
      mkdir -p ${CI_PROJECT_DIR}/bin
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --output ${CI_PROJECT_DIR}/bin/alexos-cli "${CI_API_V4_URL}/projects/${ALEXOS_CLI_PROJECT_ID}/packages/generic/alexos-cli/${LATEST_VERSION}/alexos-cli-linux-amd64"
      chmod +x ${CI_PROJECT_DIR}/bin/alexos-cli
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/bin/alexos-cli
    untracked: false
    when: on_success
    expire_in: "1 day"

build-and-push:
  stage: build-and-push
  needs:
    - download-alexos-cli
  variables:
    KUBERNETES_CPU_REQUEST: "1"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.docker
    - creds=$(echo -n "al3xos:${DOCKER_CREDS}" | base64 | tr -d '\n')
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${creds}\"}}}" > ~/.docker/config.json
  script:
    - |
      set -eu
      BUILD_STARTED_AT=$(date +%s)
      echo "Build started at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "Building image [${IMAGE_NAME}:${IMAGE_TAG}]"
      echo "Using registry cache [${BUILD_CACHE_REF}]"
      buildctl-daemonless.sh build \
        --progress=plain \
        --frontend=dockerfile.v0 \
        --local context=${CI_PROJECT_DIR} \
        --local dockerfile=${CI_PROJECT_DIR} \
        --opt filename=Dockerfile \
        --import-cache type=registry,ref=${BUILD_CACHE_REF} \
        --export-cache type=registry,ref=${BUILD_CACHE_REF},mode=max \
        --output type=image,name=${IMAGE_NAME}:${IMAGE_TAG},push=true \
        --output type=image,name=${IMAGE_NAME}:latest,push=true
      BUILD_FINISHED_AT=$(date +%s)
      echo "Build finished at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "Build duration: $((BUILD_FINISHED_AT - BUILD_STARTED_AT)) seconds"
